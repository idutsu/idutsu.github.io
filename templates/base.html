<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=700">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=block">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  <style>html.wf-loading body { visibility: hidden; }</style>
  <script>document.documentElement.classList.add('wf-loading');</script>
</head>
<body>
  <header>
    {% if current_path is defined and current_path == "/" %}
    <h1><a href="{{ config.base_url }}">{{ config.title }}</a></h1>
    {% else %}
    <p><a href="{{ config.base_url }}">{{ config.title }}</a></p>
    {% endif %}
    <nav>
      <a href="{{ config.base_url }}">HOME</a>
      <a href="{{ get_url(path='@/about.md') }}">ABOUT</a>
      <a href="{{ get_url(path='@/contact.md') }}">CONTACT</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  <script>
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(function () {
        document.documentElement.classList.remove('wf-loading');
      });
    } else {
      document.documentElement.classList.remove('wf-loading');
    }
  </script>
</body>
</html>
